<style>
:root {
  --moe-purple: #4B1FA8;
  --moe-purple-dark: #3A1582;
  --moe-purple-light: #F2EDFB;
  --moe-teal: #00A86B;
  --moe-teal-dark: #008556;
  --moe-teal-light: #E5F5EE;
  --ink: #0F1729;
  --ink-soft: #4A5568;
  --ink-muted: #8895A7;
  --bg: #FAFBFC;
  --surface: #FFFFFF;
  --border: #E5E7EB;
  --border-soft: #F1F3F5;
  --danger: #DC2626;
  --danger-bg: #FEF2F2;
  --warn: #D97706;
  --shadow-sm: 0 1px 2px rgba(15, 23, 41, 0.04);
  --shadow: 0 4px 16px rgba(15, 23, 41, 0.06);
  --shadow-lg: 0 12px 40px rgba(75, 31, 168, 0.12);
  --radius: 12px;
  --radius-lg: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'IBM Plex Sans Arabic', system-ui, -apple-system, sans-serif;
  font-size: 15px;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}

body {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ===== الهيدر العلوي ===== */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.app-header.hidden { display: none; }
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 15px;
}
.brand-mark {
  width: 32px; height: 32px;
  background: var(--moe-purple);
  border-radius: 8px;
  display: grid; place-items: center;
  color: white; font-weight: 700;
}
.btn-icon {
  background: transparent;
  border: 1px solid var(--border);
  width: 38px; height: 38px;
  border-radius: 10px;
  display: grid; place-items: center;
  cursor: pointer;
  color: var(--ink-soft);
  transition: all .15s;
}
.btn-icon:hover { background: var(--border-soft); color: var(--ink); }

/* ===== المحتوى الرئيسي ===== */
.app-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 540px;
  margin: 0 auto;
  padding: 24px 20px 40px;
}

.screen { display: none; animation: fadeIn .25s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ===== شاشة الدخول ===== */
#login-screen { padding-top: 8vh; }
.login-hero {
  text-align: center;
  margin-bottom: 32px;
}
.login-hero .logo {
  width: 72px; height: 72px;
  margin: 0 auto 18px;
  background: linear-gradient(135deg, var(--moe-purple) 0%, #6B3FD8 100%);
  border-radius: 20px;
  display: grid; place-items: center;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}
.login-hero .logo::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 20%, rgba(255,255,255,.25), transparent 60%);
}
.login-hero .logo svg { width: 36px; height: 36px; position: relative; z-index: 1; }
.login-hero h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.01em; }
.login-hero p { color: var(--ink-muted); font-size: 14px; }

.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 28px 22px;
  box-shadow: var(--shadow-sm);
}

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  padding: 13px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  font-family: inherit;
  background: var(--surface);
  color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.field input:focus {
  outline: none;
  border-color: var(--moe-purple);
  box-shadow: 0 0 0 4px rgba(75, 31, 168, 0.10);
}
.field input::placeholder { color: var(--ink-muted); }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 18px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .08s, background .15s, box-shadow .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary {
  background: var(--moe-purple);
  color: white;
  box-shadow: 0 4px 14px rgba(75, 31, 168, .25);
}
.btn-primary:hover:not(:disabled) { background: var(--moe-purple-dark); }
.btn-primary:active:not(:disabled) { transform: scale(.98); }
.btn-primary:disabled { opacity: .55; cursor: wait; }
.btn-ghost {
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--border-soft); color: var(--ink); }

.alert {
  background: var(--danger-bg);
  color: var(--danger);
  padding: 11px 14px;
  border-radius: var(--radius);
  font-size: 13.5px;
  margin-bottom: 16px;
  border: 1px solid #FECACA;
  display: none;
}
.alert.visible { display: block; }

.config-warn {
  margin-top: 18px;
  padding: 12px 14px;
  background: #FFF8E1;
  border: 1px solid #FFE082;
  color: #6D4C00;
  border-radius: var(--radius);
  font-size: 13px;
}

/* ===== شاشة اختيار المدرسة ===== */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}
.screen-subtitle {
  color: var(--ink-muted);
  font-size: 14px;
  margin-bottom: 20px;
}
.school-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.school-item {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  text-align: right;
  width: 100%;
  font-family: inherit;
}
.school-item:hover {
  border-color: var(--moe-purple);
  background: var(--moe-purple-light);
}
.school-item .info .name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.school-item .info .role { font-size: 13px; color: var(--ink-muted); }
.school-item .arrow { color: var(--moe-purple); font-size: 20px; }

/* ===== لوحة التحكم ===== */
.user-card {
  background: linear-gradient(135deg, var(--moe-purple) 0%, #5E2FBE 100%);
  color: white;
  border-radius: var(--radius-lg);
  padding: 22px 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}
.user-card::before {
  content: '';
  position: absolute;
  top: -40px; left: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(0, 168, 107, .35), transparent 70%);
  border-radius: 50%;
}
.user-card .greeting {
  font-size: 13px;
  opacity: .85;
  margin-bottom: 4px;
  position: relative;
}
.user-card .name {
  font-size: 19px;
  font-weight: 700;
  margin-bottom: 14px;
  position: relative;
}
.user-card .meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  position: relative;
}
.user-card .pill {
  background: rgba(255, 255, 255, .18);
  backdrop-filter: blur(6px);
  padding: 5px 11px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 500;
}

.section-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-muted);
  margin: 24px 0 12px;
}

.modules-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.module-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.module-tile:hover {
  border-color: var(--moe-purple);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.module-tile.locked {
  opacity: .42;
  cursor: not-allowed;
}
.module-tile.locked:hover {
  border-color: var(--border);
  transform: none;
  box-shadow: none;
}
.module-tile .icon {
  width: 38px; height: 38px;
  background: var(--moe-purple-light);
  color: var(--moe-purple);
  border-radius: 10px;
  display: grid; place-items: center;
  margin: 0 auto 9px;
  font-size: 18px;
}
.module-tile.locked .icon {
  background: var(--border-soft);
  color: var(--ink-muted);
}
.module-tile .label {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
}

.perms-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.perm-chip {
  background: var(--moe-teal-light);
  color: var(--moe-teal-dark);
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-family: 'IBM Plex Sans Arabic', monospace;
  font-weight: 500;
}

/* ===== Toast ===== */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: white;
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s, transform .2s;
}
#toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== سبينر ===== */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.app-footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: var(--ink-muted);
}

@media (min-width: 768px) {
  .app-main { padding-top: 40px; }
  .modules-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<header class="app-header hidden" id="appHeader">
  <div class="brand">
    <div class="brand-mark">ظ</div>
    <div>بوابة المدرسة</div>
  </div>
  <button class="btn-icon" id="logoutBtn" title="تسجيل الخروج" aria-label="تسجيل الخروج">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
  </button>
</header>

<main class="app-main">

  <!-- شاشة الدخول -->
  <section class="screen active" id="login-screen">
    <div class="login-hero">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 4 L20 9 L12 14 L4 9 Z" fill="#00A86B"/>
          <rect x="9.5" y="13" width="5" height="7" fill="white"/>
        </svg>
      </div>
      <h1>بوابة مدرسة الظهران</h1>
      <p>الرجاء تسجيل الدخول للمتابعة</p>
    </div>

    <div class="card">
      <div class="alert" id="loginAlert"></div>
      <form id="loginForm">
        <div class="field">
          <label for="nationalId">رقم الهوية الوطنية</label>
          <input type="tel" id="nationalId" inputmode="numeric" autocomplete="username" placeholder="١٠ أرقام" required maxlength="10">
        </div>
        <div class="field">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">دخول</button>
      </form>
      <div class="config-warn" id="configWarn" style="display:none">
        ⚠️ لم يتم ضبط رابط الـ API بعد. عدّل قيمة <code>API_URL</code> في أعلى الكود.
      </div>
    </div>
  </section>

  <!-- شاشة اختيار المدرسة -->
  <section class="screen" id="school-screen">
    <h2 class="screen-title">اختر المدرسة</h2>
    <p class="screen-subtitle">لديك صلاحية الدخول لعدة مدارس</p>
    <div class="school-list" id="schoolList"></div>
  </section>

  <!-- لوحة التحكم -->
  <section class="screen" id="dashboard-screen">
    <div class="user-card">
      <div class="greeting">مرحباً بك،</div>
      <div class="name" id="userName">—</div>
      <div class="meta">
        <span class="pill" id="userRole">—</span>
        <span class="pill" id="userSchool">—</span>
      </div>
    </div>

    <div class="section-label">الوحدات المتاحة</div>
    <div class="modules-grid" id="modulesGrid"></div>

    <div class="section-label">صلاحياتك</div>
    <div class="perms-list" id="permsList"></div>
  </section>

</main>

<div id="toast"></div>

<footer class="app-footer">
  بوابة المدرسة · الإصدار 1.0
</footer>

<script>
// ============================================================
// الإعدادات
// ============================================================
const CONFIG = {
  API_URL: 'https://script.google.com/macros/s/AKfycbzEwR-LJONyy5da_SJxYTOtpuv7EULUKoBeDqwYL8KVni8eRHnifxqzPME_mEIxVTNhdQ/exec',
  STORAGE_KEY: 'school_portal_token_v1',
};

// تعريف الوحدات: التسمية، الأيقونة، والصلاحية المطلوبة لفتحها
const MODULES = [
  { id: 'students',   label: 'متابعة الطلاب', icon: '👥', perm: 'students.view' },
  { id: 'attendance', label: 'الحضور والغياب', icon: '📋', perm: 'attendance.record' },
  { id: 'exams',      label: 'الاختبارات',    icon: '📝', perm: 'exams.manage' },
  { id: 'staff',      label: 'شؤون الموظفين', icon: '👔', perm: 'staff.manage' },
  { id: 'reports',    label: 'التقارير',      icon: '📊', perm: 'reports.view' },
  { id: 'messaging',  label: 'الإشعارات',     icon: '💬', perm: 'messaging.send' },
  { id: 'import',     label: 'الاستيراد',     icon: '📥', perm: 'import.madrasati' },
  { id: 'users',      label: 'المستخدمون',    icon: '🔑', perm: 'users.create' },
  { id: 'audit',      label: 'سجل العمليات',  icon: '🛡️', perm: 'system.audit_log' },
];

// ============================================================
// عميل الـ API
// ============================================================
async function api(action, params = {}) {
  if (!CONFIG.API_URL || CONFIG.API_URL.indexOf('PUT_YOUR') === 0) {
    throw new Error('API_URL غير مضبوط');
  }
  // Apps Script يتطلب GET أو POST بـ text/plain لتفادي CORS preflight
  const query = new URLSearchParams({ action, ...params });
  const url = CONFIG.API_URL + '?' + query.toString();
  let res;
  try {
    res = await fetch(url, { method: 'GET', redirect: 'follow' });
  } catch (netErr) {
    throw new Error('تعذّر الاتصال بالخادم. تحقق من الإنترنت أو من رابط الـ API.');
  }
  if (!res.ok) throw new Error('خطأ في الاتصال بالخادم (' + res.status + ')');
  let data;
  try {
    data = await res.json();
  } catch (parseErr) {
    throw new Error('رد الخادم غير صالح. قد يكون النشر منتهياً.');
  }
  if (!data.ok) throw new Error(data.error || 'حدث خطأ');
  return data.data;
}

// ============================================================
// إدارة الحالة
// ============================================================
const state = {
  token: null,
  context: null,
};

function saveToken(t) {
  state.token = t;
  if (t) localStorage.setItem(CONFIG.STORAGE_KEY, t);
  else localStorage.removeItem(CONFIG.STORAGE_KEY);
}

function loadToken() {
  state.token = localStorage.getItem(CONFIG.STORAGE_KEY);
  return state.token;
}

// ============================================================
// التنقل بين الشاشات
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('appHeader').classList.toggle('hidden', id === 'login-screen');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => t.classList.remove('visible'), ms);
}

function showLoginAlert(msg) {
  const a = document.getElementById('loginAlert');
  a.textContent = msg;
  a.classList.add('visible');
}
function hideLoginAlert() {
  document.getElementById('loginAlert').classList.remove('visible');
}

// ============================================================
// عرض المدارس
// ============================================================
function renderSchools(schools) {
  const list = document.getElementById('schoolList');
  list.innerHTML = '';
  schools.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'school-item';
    btn.innerHTML = `
      <div class="info">
        <div class="name">${escapeHtml(s.name)}</div>
        <div class="role">الدور: ${roleLabel(s.role_code)}</div>
      </div>
      <div class="arrow">←</div>
    `;
    btn.onclick = () => switchToSchool(s.school_id);
    list.appendChild(btn);
  });
}

async function switchToSchool(schoolId) {
  try {
    const ctx = await api('switchSchool', { token: state.token, school_id: schoolId });
    state.context = ctx;
    renderDashboard();
    showScreen('dashboard-screen');
  } catch (e) {
    showToast(e.message);
  }
}

// ============================================================
// عرض لوحة التحكم
// ============================================================
function renderDashboard() {
  const c = state.context;
  document.getElementById('userName').textContent = c.full_name || '—';
  document.getElementById('userRole').textContent = roleLabel(c.role_code);
  document.getElementById('userSchool').textContent = c.active_school_name || '—';

  // الوحدات
  const grid = document.getElementById('modulesGrid');
  grid.innerHTML = '';
  MODULES.forEach(m => {
    const has = c.permissions.includes(m.perm);
    const tile = document.createElement('div');
    tile.className = 'module-tile' + (has ? '' : ' locked');
    tile.innerHTML = `
      <div class="icon">${m.icon}</div>
      <div class="label">${m.label}</div>
    `;
    tile.onclick = () => {
      if (!has) return showToast('لا تملك صلاحية لهذه الوحدة');
      showToast(m.label + ' — قيد التطوير');
    };
    grid.appendChild(tile);
  });

  // الصلاحيات
  const perms = document.getElementById('permsList');
  perms.innerHTML = '';
  c.permissions.forEach(p => {
    const chip = document.createElement('span');
    chip.className = 'perm-chip';
    chip.textContent = p;
    perms.appendChild(chip);
  });
}

// ============================================================
// مساعدات
// ============================================================
const ROLE_NAMES = {
  super_admin: 'مدير النظام',
  school_admin: 'قائد المدرسة',
  vice_principal: 'وكيل المدرسة',
  counselor: 'المرشد الطلابي',
  teacher: 'معلم',
  parent: 'ولي أمر',
  student: 'طالب',
};
function roleLabel(code) { return ROLE_NAMES[code] || code; }

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ============================================================
// التدفق الرئيسي
// ============================================================
async function handleContextLoaded(ctx) {
  state.context = ctx;
  if (ctx.available_schools && ctx.available_schools.length > 1) {
    renderSchools(ctx.available_schools);
    showScreen('school-screen');
    return;
  }
  renderDashboard();
  showScreen('dashboard-screen');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideLoginAlert();
  const btn = document.getElementById('loginBtn');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> جاري الدخول...';

  try {
    const ctx = await api('login', {
      national_id: document.getElementById('nationalId').value.trim(),
      password: document.getElementById('password').value,
      user_agent: navigator.userAgent.substring(0, 100),
    });
    saveToken(ctx.token);
    document.getElementById('password').value = '';
    await handleContextLoaded(ctx);
  } catch (err) {
    showLoginAlert(err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalText;
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  try { await api('logout', { token: state.token }); } catch (e) {}
  saveToken(null);
  state.context = null;
  showScreen('login-screen');
  showToast('تم تسجيل الخروج');
});

// محاولة استئناف الجلسة عند فتح التطبيق
async function init() {
  // تنبيه إذا لم يُضبط الـ API
  if (!CONFIG.API_URL || CONFIG.API_URL.indexOf('PUT_YOUR') === 0) {
    document.getElementById('configWarn').style.display = 'block';
  }

  const token = loadToken();
  if (!token) return showScreen('login-screen');

  try {
    const ctx = await api('me', { token });
    await handleContextLoaded(ctx);
  } catch (e) {
    saveToken(null);
    showScreen('login-screen');
  }
}

// تسجيل service worker إن وُجد (اختياري - لتحسين قابلية التثبيت على Android)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {/* اختياري */});
  });
}

init();
</script>
